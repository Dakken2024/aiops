<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AiOps | 智能运维平台</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">

  <style>
      /* 1. 全屏背景容器 */
      #vanta-bg {
          position: fixed;
          top: 0; left: 0;
          width: 100%; height: 100%;
          z-index: 0;
      }

      body {
          /* 确保内容居中 */
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          margin: 0;
          overflow: hidden; /* 防止出现滚动条 */
          font-family: 'Source Sans Pro', sans-serif;
      }

      /* 2. 登录框层级提高，浮在背景之上 */
      .login-box {
          width: 420px;
          z-index: 10;
          position: relative;
      }

      /* 3. 毛玻璃特效卡片 */
      .card {
          /* 背景极其透明，让动态效果透过来 */
          background: rgba(16, 30, 50, 0.4);
          /* 模糊滤镜 */
          backdrop-filter: blur(8px);
          -webkit-backdrop-filter: blur(8px);
          /* 边框发光 */
          border: 1px solid rgba(0, 255, 255, 0.1);
          box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
          color: #fff;
          border-radius: 16px;
      }

      /* 标题文字 */
      .card-header {
          border-bottom: 1px solid rgba(255, 255, 255, 0.1);
          background: transparent;
      }
      .h1 {
          color: #fff;
          font-weight: 600;
          letter-spacing: 2px;
          text-shadow: 0 0 10px rgba(0, 123, 255, 0.8);
      }

      /* 输入框美化 */
      .form-control {
          background: rgba(0, 0, 0, 0.4) !important;
          border: 1px solid rgba(0, 255, 255, 0.2);
          color: #fff !important;
          height: 45px;
      }
      .form-control::placeholder { color: #888; }
      .form-control:focus {
          background: rgba(0, 0, 0, 0.6) !important;
          border-color: #00eaff;
          box-shadow: 0 0 10px rgba(0, 234, 255, 0.3);
      }

      .input-group-text {
          background: rgba(0, 0, 0, 0.4);
          border: 1px solid rgba(0, 255, 255, 0.2);
          color: #00eaff; /* 图标发光色 */
      }

      /* 按钮赛博朋克风 */
      .btn-primary {
          background: linear-gradient(90deg, #007bff, #00d4ff);
          border: none;
          font-weight: bold;
          letter-spacing: 2px;
          height: 45px;
          transition: all 0.3s ease;
      }
      .btn-primary:hover {
          background: linear-gradient(90deg, #0056b3, #0099cc);
          box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
          transform: translateY(-2px);
      }

      /* 底部链接 */
      .login-box-msg { color: #aab; }
      .icheck-primary label { color: #ccc; }
      a { color: #00eaff; }
      a:hover { color: #fff; text-shadow: 0 0 5px #00eaff; }
  </style>
</head>
<body>

<div id="vanta-bg"></div>

<div class="login-box">
  <div class="card card-outline card-primary">
    <div class="card-header text-center">
      <a href="#" class="h1">
          <i class="fas fa-robot mr-2"></i><b>Ai</b>Ops
      </a>
    </div>
    <div class="card-body">
      <p class="login-box-msg">智能运维 · 自动化 · 安全审计</p>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger alert-dismissible fade show" role="alert" style="background: rgba(220, 53, 69, 0.8); border:none; color:white;">
             <button type="button" class="close" data-dismiss="alert" style="color:white;">×</button>
             <small>{{ message }}</small>
          </div>
        {% endfor %}
      {% endif %}

      <form action="" method="post">
        {% csrf_token %}
        <div class="input-group mb-3">
          <input type="text" name="username" class="form-control" placeholder="用户名" required>
          <div class="input-group-append">
            <div class="input-group-text"><span class="fas fa-user"></span></div>
          </div>
        </div>
        <div class="input-group mb-3">
          <input type="password" name="password" class="form-control" placeholder="密码" required>
          <div class="input-group-append">
            <div class="input-group-text"><span class="fas fa-lock"></span></div>
          </div>
        </div>
        <div class="row">
          <div class="col-8">
            <div class="icheck-primary">
              <input type="checkbox" id="remember">
              <label for="remember">记住我</label>
            </div>
          </div>
          <div class="col-4">
            <button type="submit" class="btn btn-primary btn-block">登录</button>
          </div>
        </div>
      </form>

      <p class="mb-0 mt-4 text-center">
        <a href="{% url 'register' %}" class="text-center">申请注册新账号</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.net.min.js"></script>

<script>
// 初始化动态背景
VANTA.NET({
  el: "#vanta-bg",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200.00,
  minWidth: 200.00,
  scale: 1.00,
  scaleMobile: 1.00,
  color: 0x00eaff,       /* 粒子连线的颜色 (青色) */
  backgroundColor: 0x0b1e2e, /* 背景底色 (深蓝) */
  points: 12.00,         /* 粒子数量密度 */
  maxDistance: 22.00,    /* 连线距离 */
  spacing: 18.00,        /* 间距 */
  showDots: true         /* 显示节点 */
})
</script>

</body>
</html>
